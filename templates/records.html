<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entity_name }} Records - OSDU Data Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container app-shell fade-in">
        {% include '_nav.html' %}
        <div class="data-viewer-shell">
            {% include '_data_viewer_sidebar.html' %}
            <main class="data-viewer-main">
                <div class="breadcrumb">
                    <a href="/">Home</a>
                    <span>/</span>
                    <a href="/data-catalog">Data Catalog</a>
                    <span>/</span>
                    <a href="/domain/{{ domain_name|urlencode }}">{{ domain_name }}</a>
                    <span>/</span>
                    <span>{{ entity_name }}</span>
                </div>

                <header class="admin-topbar">
                    <div>
                        <span class="eyebrow">Records</span>
                        <h1>{{ entity_name }}</h1>
                        <p><span id="totalCountInline">-</span> records · page <span id="currentPageInline">1</span></p>
                    </div>
                </header>

                <div class="record-kind-banner">
                    <span>Kind</span>
                    <code>{{ entity_kind }}</code>
                </div>

                <div class="records-toolbar compact-toolbar">
                    <label>
                        Search records
                        <input id="recordSearch" placeholder="Search records..." oninput="renderRecords()">
                    </label>
                    <label>
                        Sort
                        <select id="sortSelect" onchange="renderRecords()">
                            <option value="display">Display name</option>
                            <option value="id">Record id</option>
                            <option value="version">Version</option>
                            <option value="modified">Modified time</option>
                        </select>
                    </label>
                    <label>
                        Page size
                        <select id="pageSizeSelect" onchange="loadRecords(0)">
                            <option value="25">25</option>
                            <option value="50" selected>50</option>
                            <option value="100">100</option>
                        </select>
                    </label>
                    <button class="btn btn-primary" onclick="loadRecords(currentOffset)">Refresh</button>
                    <button class="btn" onclick="exportJSON()">Export</button>
                    <button class="btn" onclick="toggleSelectAll()" id="selectAllBtn" disabled>Select All</button>
                    <button class="btn btn-danger" onclick="openDeleteSelectedModal()" id="deleteSelectedBtn" disabled>Delete</button>
                </div>

                <div class="record-stat-line">
                    <span><strong id="loadedCount">-</strong> loaded</span>
                    <span><strong id="selectedCount">0</strong> selected</span>
                </div>

                <div id="recordList" class="record-grid">
                    <div class="skeleton-list"><span></span><span></span><span></span></div>
                </div>

                <div id="pagination" class="pagination"></div>
            </main>
        </div>
    </div>

    <div class="confirm-modal is-hidden" id="bulkDeleteModal" role="dialog" aria-modal="true">
        <div class="confirm-modal__panel">
            <h2>Confirm Delete</h2>
            <p>Delete <strong id="bulkDeleteCount">0</strong> selected record(s).</p>
            <label>
                Type DELETE to confirm
                <input id="bulkDeleteConfirm" placeholder="DELETE">
            </label>
            <div class="confirm-modal__actions">
                <button class="btn" onclick="closeDeleteSelectedModal()">Cancel</button>
                <button class="btn btn-danger" onclick="deleteSelected()">Confirm Delete</button>
            </div>
            <p class="muted" id="bulkDeleteMessage"></p>
        </div>
    </div>

    <script>
        let currentOffset = 0;
        let currentLimit = 50;
        let totalCount = 0;
        let allRecords = [];
        let selectedRecords = new Set();
        let selectAllState = false;

        async function loadRecords(offset = 0) {
            currentOffset = offset;
            currentLimit = parseInt(document.getElementById('pageSizeSelect').value, 10) || 50;
            selectedRecords.clear();
            selectAllState = false;
            updateSelectedUi();
            document.getElementById('recordList').innerHTML = '<div class="skeleton-list"><span></span><span></span><span></span></div>';
            try {
                const url = `/api/records/{{ domain_name|urlencode }}/{{ entity_name|urlencode }}?limit=${currentLimit}&offset=${currentOffset}&fields=basic`;
                const data = await window.osduFetchJson(url);
                totalCount = data.totalCount || 0;
                allRecords = data.results || [];
                document.getElementById('totalCountInline').textContent = totalCount;
                document.getElementById('loadedCount').textContent = allRecords.length;
                document.getElementById('currentPageInline').textContent = Math.floor(currentOffset / currentLimit) + 1;
                renderRecords();
                updatePagination();
            } catch (error) {
                document.getElementById('recordList').innerHTML = '<div class="error"><strong>Cannot load records</strong><br><span>Check token, partition, or permission</span></div>';
            }
        }

        function renderRecords() {
            const recordList = document.getElementById('recordList');
            let records = allRecords.slice();
            const term = document.getElementById('recordSearch').value.toLowerCase();
            if (term) {
                records = records.filter((record) => JSON.stringify(record).toLowerCase().includes(term));
            }
            records.sort(compareRecords);
            if (!records.length) {
                recordList.innerHTML = '<div class="empty-state">No records found</div>';
                document.getElementById('selectAllBtn').disabled = true;
                return;
            }
            document.getElementById('selectAllBtn').disabled = false;
            recordList.innerHTML = records.map(recordCardHtml).join('');
        }

        function recordCardHtml(record) {
            const displayName = getDisplayName(record, '{{ entity_name }}');
            const version = record.version || record.meta?.version || '-';
            const acl = record.acl || {};
            const legal = record.legal || {};
            const viewers = (acl.viewers || []).length;
            const owners = (acl.owners || []).length;
            const legalTags = legal.legaltags || legal.legalTags || [];
            const checked = selectedRecords.has(record.id) ? 'checked' : '';
            const idJson = JSON.stringify(record.id || '');
            return `
                <article class="record-card card" onclick="viewRecord('${encodeURIComponent(record.id)}')">
                    <div class="record-card__top">
                        <label class="record-card__check" onclick="event.stopPropagation()">
                            <input type="checkbox" ${checked} onchange='toggleRecordSelection(${idJson})'>
                        </label>
                        <span class="badge badge-blue">v${escapeHtml(version)}</span>
                    </div>
                    <h3>${escapeHtml(displayName)}</h3>
                    <p class="muted break-text">${escapeHtml(shortId(record.id || ''))}</p>
                    <div class="card-meta-row">
                        <span>${escapeHtml(shortKind(record.kind || ''))}</span>
                        <span>viewers ${viewers}</span>
                        <span>owners ${owners}</span>
                        ${getModifiedTime(record) ? `<span>${escapeHtml(getModifiedTime(record))}</span>` : ''}
                    </div>
                    <div class="record-card__footer">
                        ${legalTags.length ? legalTags.slice(0, 2).map((tag) => `<span class="badge badge-blue">${escapeHtml(tag)}</span>`).join(' ') : '<span class="muted">No legal tags</span>'}
                    </div>
                </article>
            `;
        }

        function compareRecords(a, b) {
            const sort = document.getElementById('sortSelect').value;
            if (sort === 'id') return String(a.id || '').localeCompare(String(b.id || ''));
            if (sort === 'version') return Number(b.version || 0) - Number(a.version || 0);
            if (sort === 'modified') return String(getModifiedTime(b)).localeCompare(String(getModifiedTime(a)));
            return getDisplayName(a, '{{ entity_name }}').localeCompare(getDisplayName(b, '{{ entity_name }}'));
        }

        function getDisplayName(record, entityName) {
            const data = record.data || {};
            const nested = (obj, path) => path.split('.').reduce((current, part) => current && typeof current === 'object' ? current[part] : null, obj);
            const virtualName = nested(data, 'VirtualProperties.DefaultName');
            if (virtualName) return virtualName;
            const patternField = `${entityName}Name`;
            if (data[patternField]) return data[patternField];
            const nameKey = Object.keys(data).find((key) => key.endsWith('Name') && typeof data[key] === 'string' && data[key]);
            if (nameKey) return data[nameKey];
            for (const field of ['Name', 'name', 'Title', 'title']) {
                if (data[field]) return data[field];
            }
            return (record.id || '').split(':').pop() || record.id || 'Unnamed record';
        }

        function getModifiedTime(record) {
            return record.modifyTime || record.modifiedTime || record.meta?.modifyTime || record.meta?.modifiedTime || record.createTime || record.createTime || '';
        }

        function toggleRecordSelection(recordId) {
            if (selectedRecords.has(recordId)) selectedRecords.delete(recordId);
            else selectedRecords.add(recordId);
            updateSelectedUi();
            renderRecords();
        }

        function toggleSelectAll() {
            selectAllState = !selectAllState;
            if (selectAllState) allRecords.forEach((record) => selectedRecords.add(record.id));
            else selectedRecords.clear();
            updateSelectedUi();
            renderRecords();
        }

        function updateSelectedUi() {
            const count = selectedRecords.size;
            document.getElementById('selectedCount').textContent = count;
            document.getElementById('deleteSelectedBtn').disabled = count === 0;
            document.getElementById('selectAllBtn').textContent = selectAllState ? 'Deselect All' : 'Select All';
        }

        function openDeleteSelectedModal() {
            if (!selectedRecords.size) return;
            document.getElementById('bulkDeleteCount').textContent = selectedRecords.size;
            document.getElementById('bulkDeleteConfirm').value = '';
            document.getElementById('bulkDeleteMessage').textContent = '';
            document.getElementById('bulkDeleteModal').classList.remove('is-hidden');
        }

        function closeDeleteSelectedModal() {
            document.getElementById('bulkDeleteModal').classList.add('is-hidden');
        }

        async function deleteSelected() {
            if (document.getElementById('bulkDeleteConfirm').value !== 'DELETE') {
                document.getElementById('bulkDeleteMessage').textContent = 'Type DELETE to confirm.';
                return;
            }
            const recordIds = Array.from(selectedRecords);
            const message = document.getElementById('bulkDeleteMessage');
            message.textContent = `Deleting ${recordIds.length} record(s)...`;
            try {
                const response = await fetch('/api/bulk-delete-records', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({record_ids: recordIds})
                });
                const result = await response.json();
                if (response.status === 401) {
                    window.osduRedirectToConnect();
                    return;
                }
                if (!response.ok || !result.success) throw new Error(result.error || 'Delete failed');
                closeDeleteSelectedModal();
                selectedRecords.clear();
                await loadRecords(currentOffset);
            } catch (error) {
                message.textContent = error.message;
            }
        }

        function updatePagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            const currentPage = Math.floor(currentOffset / currentLimit) + 1;
            const totalPages = Math.ceil(totalCount / currentLimit);
            if (totalPages <= 1) return;
            if (currentPage > 1) pagination.appendChild(pageButton('Previous', (currentPage - 2) * currentLimit));
            pagination.appendChild(document.createTextNode(` Page ${currentPage} of ${totalPages} `));
            if (currentPage < totalPages) pagination.appendChild(pageButton('Next', currentPage * currentLimit));
        }

        function pageButton(label, offset) {
            const button = document.createElement('button');
            button.className = 'btn';
            button.textContent = label;
            button.onclick = () => loadRecords(offset);
            return button;
        }

        function viewRecord(encodedRecordId) {
            window.location.href = '/record/' + encodedRecordId;
        }

        function exportJSON() {
            if (!allRecords.length) return;
            const blob = new Blob([JSON.stringify(allRecords, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `{{ entity_name }}_records_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function shortId(value) {
            const text = String(value || '');
            return text.length > 46 ? `${text.slice(0, 26)}...${text.slice(-14)}` : text;
        }

        function shortKind(value) {
            const text = String(value || '');
            return text.replace(/^osdu:/, '').replace(/:\*$/, '');
        }

        function escapeHtml(value) {
            return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
        }

        loadRecords();
    </script>
</body>
</html>
