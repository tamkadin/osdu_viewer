<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSDU Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container app-shell fade-in">
        {% include '_nav.html' %}
        <main class="home-main">
            <header class="home-header">
                <span class="eyebrow">Home</span>
                <h1>OSDU Web Console</h1>
                <p>Browse records. Review access.</p>
            </header>

            <section class="module-grid module-grid--home">
                <a class="module-card card" href="/data-catalog">
                    <span class="module-icon">⛰</span>
                    <h2>Data Catalog</h2>
                    <p>Domains and kinds</p>
                </a>
                <a class="module-card card" href="/governance">
                    <span class="module-icon">🛡</span>
                    <h2>Access Governance</h2>
                    <p>Groups and legal tags</p>
                </a>
            </section>
        </main>
    </div>
</body>
</html>
