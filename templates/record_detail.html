<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Detail - OSDU Data Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container app-shell fade-in">
        {% include '_nav.html' %}
        <div class="data-viewer-shell">
            {% include '_data_viewer_sidebar.html' %}
            <main class="data-viewer-main">
                <div class="breadcrumb">
                    <a href="/">Home</a>
                    <span>/</span>
                    <a href="/data-catalog">Data Catalog</a>
                    <span>/</span>
                    <a href="javascript:history.back()">Records</a>
                    <span>/</span>
                    <span>Record Detail</span>
                </div>

                <header class="admin-topbar">
                    <div>
                        <span class="eyebrow">Record detail</span>
                        <h1 id="recordTitle">Record</h1>
                        <p id="recordId" class="break-text"></p>
                        <div class="header-badges">
                            <span class="badge" id="kindBadge">kind</span>
                            <span class="badge" id="versionBadge">version</span>
                            <span class="badge">{{ active_partition or 'osdu' }}</span>
                        </div>
                    </div>
                    <div class="header-actions">
                        <a class="btn" id="checkAccessLink" href="/governance/access-checker?record_id={{ record_id|urlencode }}">Check Access</a>
                    </div>
                </header>

                <div class="actions actions--split">
                    <div>
                        <button class="btn" onclick="copyToClipboard()">Copy</button>
                        <button class="btn btn-success" onclick="downloadJson()">Download JSON</button>
                        <button class="btn" onclick="downloadCsv()">Download CSV</button>
                        <button class="btn" onclick="loadRecord()">Refresh</button>
                    </div>
                    <button class="btn btn-danger" onclick="openDeleteModal()">Delete Record</button>
                </div>

                <div class="tab-bar" role="tablist">
                    <button class="tab-button active" data-tab="summary" onclick="setTab('summary')">Summary</button>
                    <button class="tab-button" data-tab="governance" onclick="setTab('governance')">Governance</button>
                    <button class="tab-button" data-tab="json" onclick="setTab('json')">JSON</button>
                    <button class="tab-button" data-tab="tree" onclick="setTab('tree')">Tree</button>
                    <button class="tab-button" data-tab="csv" onclick="setTab('csv')">CSV</button>
                </div>

                <section class="tab-panel active" id="tab-summary">
                    <div id="summaryContent" class="record-content"><div class="skeleton-list"><span></span><span></span><span></span></div></div>
                </section>
                <section class="tab-panel" id="tab-governance">
                    <div id="governanceContent" class="record-content"></div>
                </section>
                <section class="tab-panel" id="tab-json">
                    <div id="jsonContent" class="record-content"></div>
                </section>
                <section class="tab-panel" id="tab-csv">
                    <div id="csvContent" class="record-content"></div>
                </section>
                <section class="tab-panel" id="tab-tree">
                    <div id="treeContent" class="record-content"></div>
                </section>
            </main>
        </div>
    </div>

    <div class="confirm-modal is-hidden" id="deleteRecordModal" role="dialog" aria-modal="true">
        <div class="confirm-modal__panel">
            <h2>Confirm Delete</h2>
            <p>Delete current record.</p>
            <p><code class="break-text">{{ record_id }}</code></p>
            <label>
                Type DELETE to confirm
                <input id="deleteRecordConfirm" placeholder="DELETE">
            </label>
            <div class="confirm-modal__actions">
                <button class="btn" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" id="deleteRecordBtn" onclick="deleteRecord()">Confirm Delete</button>
            </div>
            <p class="muted" id="deleteRecordMessage"></p>
        </div>
    </div>

    <script>
        let recordData = null;

        function setTab(name) {
            document.querySelectorAll('.tab-button').forEach((button) => button.classList.toggle('active', button.dataset.tab === name));
            document.querySelectorAll('.tab-panel').forEach((panel) => panel.classList.toggle('active', panel.id === `tab-${name}`));
        }

        async function loadRecord() {
            const recordId = '{{ record_id }}';
            document.getElementById('recordId').textContent = recordId;
            document.getElementById('summaryContent').innerHTML = '<div class="skeleton-list"><span></span><span></span><span></span></div>';
            try {
                const data = await window.osduFetchJson('/api/record/' + encodeURIComponent(recordId));
                if (!data.records || !data.records.length) throw new Error('Record not found or not accessible');
                recordData = data.records[0];
                document.getElementById('recordTitle').textContent = getDisplayName(recordData);
                document.getElementById('kindBadge').textContent = shortKind(recordData.kind || 'kind');
                document.getElementById('kindBadge').title = recordData.kind || '';
                document.getElementById('versionBadge').textContent = `v${recordData.version || recordData.meta?.version || '-'}`;
                renderAllViews();
            } catch (error) {
                document.getElementById('summaryContent').innerHTML = '<div class="error"><strong>Cannot load record</strong><br><span>Check token, partition, or permission</span></div>';
            }
        }

        function renderAllViews() {
            renderSummary();
            renderGovernance();
            document.getElementById('jsonContent').innerHTML = `<pre>${escapeHtml(JSON.stringify(recordData, null, 2))}</pre>`;
            renderCsvView(recordData, document.getElementById('csvContent'));
            renderTreeView(recordData, document.getElementById('treeContent'));
        }

        function renderSummary() {
            const data = recordData.data || {};
            const jsonSizeKb = Math.round((new Blob([JSON.stringify(recordData)]).size / 1024) * 100) / 100;
            const fieldCount = countFields(recordData);
            document.getElementById('summaryContent').innerHTML = `
                <div class="summary-grid">
                    ${summaryItem('ID', recordData.id)}
                    ${summaryItem('Kind', recordData.kind)}
                    ${summaryItem('Version', recordData.version || recordData.meta?.version || 'N/A')}
                    ${summaryItem('Partition', '{{ active_partition or "osdu" }}')}
                    ${summaryItem('Display name', getDisplayName(recordData))}
                    ${summaryItem('Create user', recordData.createUser || recordData.meta?.createUser || 'N/A')}
                    ${summaryItem('Create time', recordData.createTime || recordData.meta?.createTime || 'N/A')}
                    ${summaryItem('Modify user', recordData.modifyUser || recordData.meta?.modifyUser || 'N/A')}
                    ${summaryItem('Modify time', recordData.modifyTime || recordData.meta?.modifyTime || 'N/A')}
                    ${summaryItem('Size', `${jsonSizeKb} KB`)}
                    ${summaryItem('Field count', fieldCount)}
                </div>
            `;
        }

        function renderGovernance() {
            const acl = recordData.acl || {};
            const legal = recordData.legal || {};
            const owners = acl.owners || [];
            const viewers = acl.viewers || [];
            const legalTags = legal.legaltags || legal.legalTags || [];
            const countries = legal.otherRelevantDataCountries || legal.dataCountries || [];
            document.getElementById('governanceContent').innerHTML = `
                <div class="summary-grid">
                    ${listItem('ACL owners', owners)}
                    ${listItem('ACL viewers', viewers)}
                    ${listItem('Legal tags', legalTags)}
                    ${listItem('Other relevant data countries', countries)}
                    ${summaryItem('Legal status', legal.status || legal.legalStatus || 'Not provided')}
                </div>
            `;
        }

        function renderCsvView(data, container) {
            const flat = flattenObject(data);
            const rows = Object.entries(flat);
            container.innerHTML = `
                <div class="table-wrap">
                    <table class="data-table">
                        <thead><tr><th>Field</th><th>Value</th></tr></thead>
                        <tbody>${rows.map(([key, value]) => `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(value)}</td></tr>`).join('')}</tbody>
                    </table>
                </div>
            `;
        }

        function renderTreeView(data, container) {
            container.innerHTML = `<pre>${escapeHtml(treeText(data))}</pre>`;
        }

        function treeText(value, depth = 0, key = '') {
            const indent = '  '.repeat(depth);
            if (Array.isArray(value)) {
                return `${indent}${key ? key + ': ' : ''}[\n${value.map((item, index) => treeText(item, depth + 1, `[${index}]`)).join('\n')}\n${indent}]`;
            }
            if (value && typeof value === 'object') {
                const lines = Object.entries(value).map(([childKey, childValue]) => treeText(childValue, depth + 1, childKey));
                return `${indent}${key ? key + ': ' : ''}{\n${lines.join('\n')}\n${indent}}`;
            }
            return `${indent}${key ? key + ': ' : ''}${String(value)}`;
        }

        function flattenObject(obj, prefix = '') {
            const flat = {};
            Object.entries(obj || {}).forEach(([key, value]) => {
                const nextKey = prefix ? `${prefix}.${key}` : key;
                if (value && typeof value === 'object' && !Array.isArray(value)) Object.assign(flat, flattenObject(value, nextKey));
                else flat[nextKey] = Array.isArray(value) ? JSON.stringify(value) : (value ?? '');
            });
            return flat;
        }

        function summaryItem(label, value) {
            return `<div class="summary-item"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value ?? '')}</strong></div>`;
        }

        function listItem(label, values) {
            const items = values || [];
            return `<div class="summary-item summary-item--wide"><span>${escapeHtml(label)}</span>${items.length ? `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>` : '<strong>None</strong>'}</div>`;
        }

        function getDisplayName(record) {
            const data = record.data || {};
            const nested = (obj, path) => path.split('.').reduce((current, part) => current && typeof current === 'object' ? current[part] : null, obj);
            const virtualName = nested(data, 'VirtualProperties.DefaultName');
            if (virtualName) return virtualName;
            const nameKey = Object.keys(data).find((key) => key.endsWith('Name') && typeof data[key] === 'string' && data[key]);
            if (nameKey) return data[nameKey];
            return data.Name || data.name || record.id;
        }

        function countFields(obj) {
            if (!obj || typeof obj !== 'object') return 0;
            return Object.values(obj).reduce((count, value) => count + 1 + countFields(value), 0);
        }

        function copyToClipboard() {
            if (!recordData) return;
            navigator.clipboard.writeText(JSON.stringify(recordData, null, 2));
        }

        function downloadJson() {
            if (!recordData) return;
            downloadBlob(new Blob([JSON.stringify(recordData, null, 2)], {type: 'application/json'}), safeFilename(recordData.id) + '.json');
        }

        function downloadCsv() {
            if (!recordData) return;
            const flat = flattenObject(recordData);
            const headers = Object.keys(flat);
            const values = headers.map((header) => csvEscape(flat[header]));
            downloadBlob(new Blob([headers.join(',') + '\n' + values.join(',')], {type: 'text/csv'}), safeFilename(recordData.id) + '.csv');
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function openDeleteModal() {
            document.getElementById('deleteRecordConfirm').value = '';
            document.getElementById('deleteRecordMessage').textContent = '';
            document.getElementById('deleteRecordModal').classList.remove('is-hidden');
        }

        function closeDeleteModal() {
            document.getElementById('deleteRecordModal').classList.add('is-hidden');
        }

        async function deleteRecord() {
            if (document.getElementById('deleteRecordConfirm').value !== 'DELETE') {
                document.getElementById('deleteRecordMessage').textContent = 'Type DELETE to confirm.';
                return;
            }
            const recordId = '{{ record_id }}';
            const button = document.getElementById('deleteRecordBtn');
            const message = document.getElementById('deleteRecordMessage');
            button.disabled = true;
            message.textContent = 'Deleting...';
            try {
                const response = await fetch('/api/delete-record/' + encodeURIComponent(recordId), {method: 'POST', headers: {'Content-Type': 'application/json'}});
                const result = await response.json();
                if (!response.ok || !result.success) throw new Error(result.error || 'Delete failed');
                window.history.back();
            } catch (error) {
                message.textContent = error.message;
                button.disabled = false;
            }
        }

        function csvEscape(value) {
            const text = String(value ?? '');
            return `"${text.replaceAll('"', '""')}"`;
        }

        function safeFilename(value) {
            return String(value || 'record').replace(/[^a-zA-Z0-9]/g, '_');
        }

        function shortKind(value) {
            return String(value || '').replace(/^osdu:/, '').replace(/:\*$/, '');
        }

        function escapeHtml(value) {
            return String(value ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
        }

        loadRecord();
    </script>
</body>
</html>
